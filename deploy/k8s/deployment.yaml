apiVersion: apps/v1
kind: Deployment
metadata:
  name: cards-api
  namespace: cards
  labels:
    app: cards-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cards-api
  template:
    metadata:
      labels:
        app: cards-api
    spec:
      containers:
        - name: api
          image: cards-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
